name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create, for example v1.0.0'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  CGO_ENABLED: '1'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Web dependencies
        working-directory: web
        run: npm ci
      - name: Test Web client
        working-directory: web
        run: npm test
      - name: Build embedded Web client
        working-directory: web
        run: npm run build
      - name: Run tests
        run: go test -tags sqlite_fts5 ./...

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Web dependencies
        working-directory: web
        run: npm ci
      - name: Install browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run Web end-to-end tests
        working-directory: web
        run: npm run e2e

  build:
    needs: [test, web-e2e]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            archive_ext: tar.gz
          - runner: macos-latest
            platform: macos
            archive_ext: tar.gz
          - runner: windows-latest
            platform: windows
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build embedded Web client
        working-directory: web
        shell: bash
        run: npm ci && npm run build
      - name: Install Windows CGO toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          update: false
          install: mingw-w64-ucrt-x86_64-gcc
      - name: Build Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          goos="$(go env GOOS)"
          goarch="$(go env GOARCH)"
          name="treehole-${goos}-${goarch}"
          mkdir -p dist
          go build -tags sqlite_fts5 -ldflags="-s -w -X main.version=${RELEASE_TAG}" -o "dist/${name}" ./cmd
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
      - name: Build Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          goos="$(go env GOOS)"
          goarch="$(go env GOARCH)"
          name="treehole-${goos}-${goarch}"
          mkdir -p dist
          go build -tags sqlite_fts5 -ldflags="-s -w -X main.version=${RELEASE_TAG}" -o "dist/${name}.exe" ./cmd
      - name: Archive Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = Get-ChildItem dist/treehole-windows-*.exe | Select-Object -First 1
          if (-not $binary) { throw "Windows binary was not produced" }
          $archive = Join-Path $binary.DirectoryName "$($binary.BaseName).zip"
          Compress-Archive -Path $binary.FullName -DestinationPath $archive -Force
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: treehole-${{ matrix.platform }}
          path: dist/*.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ env.RELEASE_TAG }}
          name: PkuHoleStudio ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
