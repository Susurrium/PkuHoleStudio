name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: v1/go.mod
      - name: Run tests
        working-directory: v1
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: v1/go.mod
      - name: Build
        working-directory: v1
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          name="treehole-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p dist
          go build -o "dist/${name}" ./cmd
          tar -czf "../${name}.tar.gz" -C dist "${name}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: treehole-${{ matrix.goos }}-${{ matrix.goarch }}
          path: treehole-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
